services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clipforge
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: clipforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clipforge_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - clipforge_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - clipforge_net
    volumes:
      - ./backend:/app
    command: tail -f /dev/null

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - clipforge_net
    volumes:
      - ./backend:/app
      - tmp_processing:/tmp

  # =========================================================================
  # UNIFIED FRONTEND CLIENT & REVERSE PROXY LAYER
  # Replaces the interim local development nginx block entirely.
  # Static assets compiled at build time — zero shared runtime volume dependencies.
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost  # Overwritten with public EC2 IP on remote deployment
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - clipforge_net

volumes:
  postgres_data:
  redis_data:
  tmp_processing:

networks:
  clipforge_net:
    driver: bridge